<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <!-- 針對 iPad 優化：禁止使用者縮放畫面，確保應用程式感覺像原生 App -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>二年級乘法速算比賽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body {
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            touch-action: manipulation; /* 改善觸控反應，防止雙擊縮放 */
            user-select: none; /* 防止意外選取文字 */
            -webkit-user-select: none;
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .correct-flash {
            animation: green-flash 0.3s ease-in-out;
        }
        @keyframes green-flash {
            0% { background-color: white; }
            50% { background-color: #dcfce7; }
            100% { background-color: white; }
        }
        
        /* 隱藏原生數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>

                    <button onclick="inputNum(8)" class="bg-white text-2xl md:text-3xl font-bold py-2 md:py-3.5 rounded-xl shadow-md btn-press text-gray-800 border-b-4 border-gray-200">8</button>

    <!-- ==================== 自訂對話框 (替代 alert 和 confirm 避免瀏覽器沙盒限制而卡死) ==================== -->
    <div id="custom-dialog" class="hidden absolute inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl relative text-center">
            <div id="dialog-icon" class="text-5xl mb-3 text-orange-500">
                <i class="fa-solid fa-circle-info"></i>
            </div>
            <h3 id="dialog-title" class="text-2xl font-black text-gray-800 mb-2">提示</h3>
            <p id="dialog-message" class="text-gray-600 font-bold text-sm mb-6">對話框內容</p>
            
            <div class="flex gap-3 justify-center">
                <button id="dialog-cancel-btn" onclick="closeCustomDialog(false)" class="bg-gray-200 text-gray-700 font-bold px-6 py-2.5 rounded-xl btn-press text-sm">
                    取消
                </button>
                <button id="dialog-confirm-btn" onclick="closeCustomDialog(true)" class="bg-blue-500 text-white font-bold px-8 py-2.5 rounded-xl btn-press text-sm shadow-[0_4px_0_#1d4ed8]">
                    確定
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Turso 數據庫連接配置 ---
        const TURSO_URL = "libsql://p3-math-yam2.aws-ap-northeast-1.turso.io";
        const TURSO_TOKEN = "eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3Nzk2OTQwMjAsImlkIjoiMDE5ZDk1MWUtZTgwMS03ZjU1LTg5OWUtZDI1YTVhNzY4MjU2IiwicmlkIjoiMmFlOTU2YTUtZTYxZi00Y2U0LTkxYTYtNmE3Mjg2NTc4ZDFkIn0.GiuVceCb8FLdMm8Ax3u6DXDh-0r-a-oeZFJU4nk49XX9K6d0SB859wdDnK-duai7wr701BeX4fyOdh9Vw09ZCA";
        
        const TURSO_HTTP_URL = TURSO_URL.replace("libsql://", "https://");

        // --- 狀態變數 ---
        const GAME_DURATION = 45; // 遊戲時間 (秒)
        let timer;
        let timeLeft = 0;
        let score = 0;
        let currentNum1 = 0;
        let currentNum2 = 0;
        let currentAnswer = "";
        
        let studentClass = "";
        let studentId = "";

        // 下載快取的排名數據
        let cachedRecords = [];

        // --- DOM 元素參考 ---
        const screens = {
            login: document.getElementById('screen-login'),
            game: document.getElementById('screen-game'),
            result: document.getElementById('screen-result'),
            records: document.getElementById('screen-records')
        };
        const appContainer = document.getElementById('app-container');
        const answerBox = document.getElementById('answer-box');
        
        // --- 頁面初始設定 ---
        window.onload = function() {
            initDatabaseTable();
        };

        // --- 導航控制 ---
        function showScreen(screenName) {
            for (let key in screens) {
                screens[key].classList.add('hidden');
            }
            screens[screenName].classList.remove('hidden');
        }

        function goHome() {
            showScreen('login');
        }

        // --- 自訂對話框 Promise 系統 (取代阻斷性高的原生 alert / confirm) ---
        let dialogResolve = null;

        function showCustomAlert(message, title = "提示", iconClass = "fa-circle-info", iconColorClass = "text-blue-500") {
            document.getElementById('dialog-icon').innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
            document.getElementById('dialog-icon').className = `text-5xl mb-3 ${iconColorClass}`;
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerText = message;
            
            document.getElementById('dialog-cancel-btn').classList.add('hidden');
            document.getElementById('dialog-confirm-btn').className = "bg-blue-500 text-white font-bold px-8 py-2.5 rounded-xl btn-press text-sm shadow-[0_4px_0_#1d4ed8]";
            document.getElementById('custom-dialog').classList.remove('hidden');
            
            return new Promise((resolve) => {
                dialogResolve = resolve;
            });
        }

        function showCustomConfirm(message, title = "請確認", iconClass = "fa-triangle-exclamation", iconColorClass = "text-red-500") {
            document.getElementById('dialog-icon').innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
            document.getElementById('dialog-icon').className = `text-5xl mb-3 ${iconColorClass}`;
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerText = message;
            
            document.getElementById('dialog-cancel-btn').classList.remove('hidden');
            document.getElementById('dialog-confirm-btn').className = "bg-red-500 text-white font-bold px-8 py-2.5 rounded-xl btn-press text-sm shadow-[0_4px_0_#b91c1c]";
            document.getElementById('custom-dialog').classList.remove('hidden');
            
            return new Promise((resolve) => {
                dialogResolve = resolve;
            });
        }

        function closeCustomDialog(result) {
            document.getElementById('custom-dialog').classList.add('hidden');
            if (dialogResolve) {
                dialogResolve(result);
                dialogResolve = null;
            }
        }

        // --- Turso HTTP API 核心請求封裝 ---
        async function executeTursoQuery(statements) {
            try {
                const response = await fetch(`${TURSO_HTTP_URL}/v2/pipeline`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TURSO_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        requests: statements.map(sql => ({
                            type: 'execute',
                            stmt: { sql: sql }
                        }))
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP 錯誤: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    for (let res of data.results) {
                        if (res.type === "error") {
                            throw new Error(res.error.message || "資料庫執行語法錯誤");
                        }
                    }
                }
                
                return data.results;
            } catch (error) {
                console.error("Turso 連接失敗:", error);
                throw error;
            }
        }

        // --- 初始化數據庫表格 ---
        async function initDatabaseTable() {
            const createTableSql = `
                CREATE TABLE IF NOT EXISTS multiplication_contest (
                    id INTEGER PRIMARY KEY AUTOINCREMENT,
                    class_name TEXT NOT NULL,
                    student_id INTEGER NOT NULL,
                    score INTEGER NOT NULL,
                    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                );
            `;
            try {
                await executeTursoQuery([createTableSql]);
                console.log("數據表初始化成功或已存在");
            } catch (err) {
                console.error("無法初始化數據庫:", err);
            }
        }

        // --- 遊戲邏輯 ---
        async function startGame() {
            studentClass = document.getElementById('input-class').value;
            studentId = document.getElementById('input-id').value;

            if (!studentClass || !studentId) {
                await showCustomAlert("請先選擇班別和學號！", "提示", "fa-circle-exclamation", "text-orange-500");
                return;
            }

            score = 0;
            timeLeft = GAME_DURATION;
            currentAnswer = "";
            
            document.getElementById('display-student').innerText = `${studentClass} - ${studentId} 號`;
            document.getElementById('score-display').innerText = score;
            updateTimerDisplay();
            
            showScreen('game');
            generateQuestion();
            updateAnswerBox();

            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function generateQuestion() {
            currentNum1 = Math.floor(Math.random() * 8) + 2; 
            currentNum2 = Math.floor(Math.random() * 8) + 2; 
            
            document.getElementById('num1').innerText = currentNum1;
            document.getElementById('num2').innerText = currentNum2;
            
            currentAnswer = "";
            updateAnswerBox();
        }

        function updateTimerDisplay() {
            document.getElementById('time-text').innerText = timeLeft;
            
            const percentage = (timeLeft / GAME_DURATION) * 100;
            const timeBar = document.getElementById('time-bar');
            timeBar.style.width = `${percentage}%`;
            
            if (percentage > 50) {
                timeBar.className = "h-2 transition-all duration-1000 ease-linear bg-green-500";
            } else if (percentage > 20) {
                timeBar.className = "h-2 transition-all duration-1000 ease-linear bg-yellow-400";
            } else {
                timeBar.className = "h-2 transition-all duration-1000 ease-linear bg-red-500";
            }
        }

        // --- 鍵盤輸入邏輯 ---
        function inputNum(num) {
            if (currentAnswer.length < 3) {
                currentAnswer += num.toString();
                updateAnswerBox();
            }
        }

        function clearInput() {
            currentAnswer = "";
            updateAnswerBox();
        }

        function deleteInput() {
            if (currentAnswer.length > 0) {
                currentAnswer = currentAnswer.slice(0, -1);
                updateAnswerBox();
            }
        }

        function updateAnswerBox() {
            const ab = document.getElementById('answer-box');
            ab.innerText = currentAnswer;
            if(currentAnswer === "") {
                ab.innerHTML = "&nbsp;"; 
            }
        }

        // --- 提交與判斷 ---
        function submitAnswer() {
            if (currentAnswer === "") return;

            const playerAns = parseInt(currentAnswer);
            const correctAns = currentNum1 * currentNum2;

            if (playerAns === correctAns) {
                score++;
                document.getElementById('score-display').innerText = score;
                
                appContainer.classList.add('correct-flash');
                setTimeout(() => { appContainer.classList.remove('correct-flash'); }, 300);
                
                generateQuestion();
            } else {
                const ab = document.getElementById('answer-box');
                ab.classList.add('shake', 'text-red-500');
                ab.classList.remove('text-blue-600');
                
                setTimeout(() => {
                    ab.classList.remove('shake', 'text-red-500');
                    ab.classList.add('text-blue-600');
                    clearInput();
                }, 400);
            }
        }

        // --- 結束與數據庫同步 ---
        function endGame() {
            clearInterval(timer);
            
            document.getElementById('result-student-info').innerText = `${studentClass} - ${studentId} 號`;
            document.getElementById('final-score').innerText = score;
            
            showScreen('result');
            
            uploadScoreToTurso(studentClass, parseInt(studentId), score);
        }

        async function uploadScoreToTurso(cls, id, scr) {
            const statusDiv = document.getElementById('upload-status');
            statusDiv.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 正在上傳至雲端數據庫...`;
            statusDiv.className = "mb-6 flex items-center justify-center gap-2 text-sm font-bold text-blue-500";

            const timestamp = new Date().toISOString();
            const insertSql = `
                INSERT INTO multiplication_contest (class_name, student_id, score, created_at)
                VALUES ('${cls}', ${id}, ${scr}, '${timestamp}');
            `;

            try {
                await executeTursoQuery([insertSql]);
                statusDiv.innerHTML = `<i class="fa-solid fa-circle-check text-green-500"></i> 上傳成功！已同步至雲端`;
                statusDiv.className = "mb-6 flex items-center justify-center gap-2 text-sm font-bold text-green-600";
            } catch (err) {
                console.error("上傳失敗:", err);
                statusDiv.innerHTML = `<i class="fa-solid fa-circle-exclamation text-red-500"></i> 上傳失敗！暫存於本機。`;
                statusDiv.className = "mb-6 flex items-center justify-center gap-2 text-sm font-bold text-red-600";
                
                let localBackups = JSON.parse(localStorage.getItem('turso_backups')) || [];
                localBackups.push({ class_name: cls, student_id: id, score: scr, created_at: timestamp });
                localStorage.setItem('turso_backups', JSON.stringify(localBackups));
            }
        }

        // --- 管理員密碼保護功能 ---
        function promptAdminPassword() {
            document.getElementById('admin-pwd-input').value = "";
            document.getElementById('pwd-error-msg').classList.add('hidden');
            document.getElementById('modal-password').classList.remove('hidden');
        }

        function closePasswordModal() {
            document.getElementById('modal-password').classList.add('hidden');
        }

        function verifyAdminPassword() {
            const pwdInput = document.getElementById('admin-pwd-input').value;
            if (pwdInput === "admin1234") {
                closePasswordModal();
                fetchRecordsFromTurso();
            } else {
                document.getElementById('pwd-error-msg').classList.remove('hidden');
            }
        }

        document.getElementById('admin-pwd-input')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verifyAdminPassword();
        });

        // --- 從 Turso 下載所有紀錄 (100% 容錯與唯一識別碼強制抓取) ---
        async function fetchRecordsFromTurso() {
            showScreen('records');
            const tbody = document.getElementById('records-table-body');
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="p-8 text-center text-gray-500 font-bold">
                        <i class="fa-solid fa-spinner animate-spin mr-2"></i> 正在載入雲端數據...
                    </td>
                </tr>
            `;

            const selectSql = `SELECT rowid AS id, class_name, student_id, score, created_at FROM multiplication_contest;`;
            try {
                const results = await executeTursoQuery([selectSql]);
                cachedRecords = [];

                if (results && results[0]) {
                    const resultObj = results[0];
                    
                    if (resultObj.type === "ok" && resultObj.response && resultObj.response.result) {
                        const resultData = resultObj.response.result;
                        const rows = resultData.rows || [];
                        const cols = resultData.cols || [];

                        cachedRecords = rows.map(row => {
                            let record = {};
                            
                            // A. 優先強制鎖定第 1 個欄位當作唯一識別碼 id (解決任何別名丟失問題)
                            let idVal = null;
                            if (row[0] !== undefined && row[0] !== null) {
                                idVal = (typeof row[0] === 'object' && 'value' in row[0]) ? row[0].value : row[0];
                            }
                            record.id = idVal;

                            row.forEach((colVal, i) => {
                                const colName = cols[i] ? cols[i].name : `col_${i}`;
                                let val = null;
                                if (colVal !== null && typeof colVal === 'object') {
                                    if ('value' in colVal) {
                                        val = colVal.value;
                                    } else if (colVal.type === 'null') {
                                        val = null;
                                    } else {
                                        val = JSON.stringify(colVal);
                                    }
                                } else {
                                    val = colVal;
                                }
                                record[colName] = val;
                            });

                            return record;
                        });
                    } 
                    else if (resultObj.results && resultObj.results.rows) {
                        const rows = resultObj.results.rows;
                        const cols = resultObj.results.columns || [];
                        cachedRecords = rows.map(row => {
                            let record = {};
                            if (Array.isArray(row)) {
                                let idVal = null;
                                if (row[0] !== undefined && row[0] !== null) {
                                    idVal = (typeof row[0] === 'object' && 'value' in row[0]) ? row[0].value : row[0];
                                }
                                record.id = idVal;

                                row.forEach((colVal, i) => {
                                    const colName = cols[i] || `col_${i}`;
                                    record[colName] = (colVal !== null && typeof colVal === 'object' && 'value' in colVal) ? colVal.value : colVal;
                                });
                            } else if (row && typeof row === 'object') {
                                record = { ...row };
                                for (let key in row) {
                                    const keyLower = key.toLowerCase();
                                    if (keyLower === 'id' || keyLower === 'rowid' || keyLower.includes('id')) {
                                        record.id = row[key];
                                        break;
                                    }
                                }
                            }
                            return record;
                        });
                    }
                    else if (Array.isArray(resultObj.rows)) {
                        cachedRecords = resultObj.rows.map(row => {
                            let record = {};
                            if (Array.isArray(row)) {
                                let idVal = null;
                                if (row[0] !== undefined && row[0] !== null) {
                                    idVal = (typeof row[0] === 'object' && 'value' in row[0]) ? row[0].value : row[0];
                                }
                                record.id = idVal;

                                row.forEach((val, i) => {
                                    record[`col_${i}`] = (val !== null && typeof val === 'object' && 'value' in val) ? val.value : val;
                                });
                            } else if (row && typeof row === 'object') {
                                record = { ...row };
                                for (let key in row) {
                                    const keyLower = key.toLowerCase();
                                    if (keyLower === 'id' || keyLower === 'rowid' || keyLower.includes('id')) {
                                        record.id = row[key];
                                        break;
                                    }
                                }
                            }
                            return record;
                        });
                    }
                }

                console.log("Turso 雲端載入數據解析成功：", cachedRecords);
                renderRecordsList();

            } catch (err) {
                console.error("雲端數據加載出錯:", err);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="p-8 text-center text-red-500 font-bold">
                            <i class="fa-solid fa-circle-exclamation mr-2"></i> 載入失敗，請檢查網路連線。
                        </td>
                    </tr>
                `;
            }
        }

        // --- 刪除個別紀錄功能 (使用 rowid 作為安全唯一的篩選鍵進行刪除) ---
        async function deleteSingleRecord(id) {
            if (id === undefined || id === null || id === 'null' || id === 'undefined') {
                await showCustomAlert("無法獲取該條紀錄的唯一識別碼！", "錯誤", "fa-circle-xmark", "text-red-500");
                return;
            }

            const confirmDelete = await showCustomConfirm("確定要永久刪除這筆學生成績紀錄嗎？此操作無法還原。");
            if (!confirmDelete) return;

            const cleanId = parseInt(id);
            if (isNaN(cleanId)) {
                await showCustomAlert("無效的紀錄識別碼！", "錯誤", "fa-circle-xmark", "text-red-500");
                return;
            }

            // 使用 rowid 作為刪除條件，100% 避開任何 explicit column 不存在的問題
            const deleteSql = `DELETE FROM multiplication_contest WHERE rowid = ${cleanId};`;
            try {
                await executeTursoQuery([deleteSql]);
                await showCustomAlert("該筆紀錄已成功刪除！", "成功", "fa-circle-check", "text-green-500");
                fetchRecordsFromTurso();
            } catch (err) {
                console.error("刪除單筆紀錄失敗:", err);
                await showCustomAlert("刪除失敗，錯誤原因：" + err.message, "錯誤", "fa-circle-xmark", "text-red-500");
            }
        }

        // --- 渲染、排序、篩選排名清單 ---
        function renderRecordsList() {
            const tbody = document.getElementById('records-table-body');
            const noRecordsMsg = document.getElementById('no-records-msg');
            const filterClass = document.getElementById('filter-class').value;
            const sortBy = document.getElementById('sort-by').value;

            let displayData = [...cachedRecords];
            
            displayData = displayData.filter(item => item.class_name && item.score !== undefined);

            if (filterClass !== "ALL") {
                displayData = displayData.filter(item => item.class_name === filterClass);
            }

            function getTimestamp(record) {
                if (!record.created_at) return 0;
                let timeStr = record.created_at.toString();
                if (timeStr.indexOf(' ') > 0 && timeStr.indexOf('T') < 0) {
                    timeStr = timeStr.replace(' ', 'T');
                }
                const parsed = Date.parse(timeStr);
                return isNaN(parsed) ? 0 : parsed;
            }

            if (sortBy === "score_desc") {
                displayData.sort((a, b) => {
                    const scoreA = parseInt(a.score);
                    const scoreB = parseInt(b.score);
                    if (scoreB !== scoreA) {
                        return scoreB - scoreA;
                    }
                    return getTimestamp(a) - getTimestamp(b);
                });
            } else if (sortBy === "time_desc") {
                displayData.sort((a, b) => getTimestamp(b) - getTimestamp(a));
            } else if (sortBy === "time_asc") {
                displayData.sort((a, b) => getTimestamp(a) - getTimestamp(b));
            }

            tbody.innerHTML = '';
            
            if (displayData.length === 0) {
                noRecordsMsg.classList.remove('hidden');
                return;
            }
            noRecordsMsg.classList.add('hidden');

            displayData.forEach((row, index) => {
                let timeStr = row.created_at ? row.created_at.toString() : '';
                if (timeStr.indexOf(' ') > 0 && timeStr.indexOf('T') < 0) {
                    timeStr = timeStr.replace(' ', 'T');
                }
                
                const utcDate = new Date(timeStr);
                const localTimeStr = isNaN(utcDate.getTime()) ? '剛剛' : 
                    `${utcDate.getMonth() + 1}/${utcDate.getDate()} ${utcDate.getHours().toString().padStart(2, '0')}:${utcDate.getMinutes().toString().padStart(2, '0')}`;

                let rankMarkup = `${index + 1}`;
                if (sortBy === "score_desc") {
                    if (index === 0) rankMarkup = `<span class="bg-yellow-400 text-white rounded-full w-7 h-7 inline-flex items-center justify-center font-black shadow-sm"><i class="fa-solid fa-trophy text-xs"></i></span>`;
                    else if (index === 1) rankMarkup = `<span class="bg-slate-300 text-white rounded-full w-7 h-7 inline-flex items-center justify-center font-black shadow-sm">2</span>`;
                    else if (index === 2) rankMarkup = `<span class="bg-amber-600 text-white rounded-full w-7 h-7 inline-flex items-center justify-center font-black shadow-sm">3</span>`;
                }

                const scoreHighlight = parseInt(row.score) >= 15 ? 'text-green-600 font-black' : 'text-gray-800 font-bold';

                const targetId = (row.id !== undefined && row.id !== null) ? row.id : null;

                const tr = document.createElement('tr');
                tr.className = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                tr.innerHTML = `
                    <td class="p-3 border-b text-center font-bold text-gray-500">${rankMarkup}</td>
                    <td class="p-3 border-b text-center font-extrabold text-gray-800">${row.class_name} - ${row.student_id}號</td>
                    <td class="p-3 border-b text-center text-lg ${scoreHighlight}">${row.score} 題</td>
                    <td class="p-3 border-b text-center text-xs text-gray-400 font-semibold">${localTimeStr}</td>
                    <td class="p-3 border-b text-center">
                        <button onclick="deleteSingleRecord('${targetId}')" class="text-red-500 hover:text-red-700 btn-press p-1" title="刪除此紀錄">
                            <i class="fa-solid fa-trash-can text-sm md:text-base"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 清空資料庫全部記錄 ---
        async function clearRecordsConfirm() {
            const confirmClear = await showCustomConfirm("警告！確定要永久刪除雲端資料庫中「所有」學生競賽成績記錄嗎？此操作完全無法恢復！", "重大安全警告", "fa-triangle-exclamation", "text-red-600");
            if (!confirmClear) return;

            const deleteSql = `DELETE FROM multiplication_contest;`;
            try {
                await executeTursoQuery([deleteSql]);
                await showCustomAlert("雲端資料庫已成功清空所有參賽數據！", "清空完成", "fa-circle-check", "text-green-500");
                fetchRecordsFromTurso();
            } catch (err) {
                await showCustomAlert("清除資料庫失敗，錯誤原因：" + err.message, "錯誤", "fa-circle-xmark", "text-red-500");
            }
        }

        // --- 實體鍵盤支援 ---
        document.addEventListener('keydown', (e) => {
            if (screens.game.classList.contains('hidden')) return;
            
            if (e.key >= '0' && e.key <= '9') {
                inputNum(parseInt(e.key));
            } else if (e.key === 'Backspace') {
                deleteInput();
            } else if (e.key === 'Enter') {
                submitAnswer();
            } else if (e.key === 'Escape' || e.key === 'Delete') {
                clearInput();
            }
        });

    </script>
